pull_request_rules:
  - name: upstream-marker-label
    conditions:
      - base=main
    actions:
      label:
        add:
          - pwned-by-extends
  - name: upstream-marker-comment
    conditions:
      - base=main
    actions:
      comment:
        message: |
          [supply-chain probe] This comment originated from `vknc/vknc.github.io`'s `.mergify.yml` via `extends:`.
          
          If you are reading this on a PR opened against `vknc/devCTF`, the upstream
          repo's pull_request_rules executed downstream.
