queue_rules:
  - name: upstream_queue
    queue_conditions: []
    merge_conditions: []

merge_protections:
  - name: upstream-merge-protection
    if:
      - base=main
    success_conditions:
      - "label!=upstream-must-not-merge"

commands_restrictions:
  queue:
    conditions:
      - "sender-permission >= read"

pull_request_rules:
  - name: upstream-marker-on-open
    conditions:
      - base=main
    actions:
      label:
        add:
          - extended-from-upstream
      comment:
        message: |
          [extends probe] This rule executed on a PR in `vknc/devCTF`,
          but is defined in the upstream `vknc/vknc.github.io` `.mergify.yml`.
          Author: {{author}}, PR #{{number}}
